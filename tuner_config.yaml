# vLLM-Tuner configuration — contains hf_token, do NOT commit
remote:
  host: 192.168.1.100
  port: 22
  user: ubuntu
  key_file: ~/.ssh/id_rsa
  working_dir: /home/ubuntu/workspace
  vllm_port: 8000
hardware:
  type: ascend
  npu_id: 4
  chip_id: 0
framework: vllm
model:
  hf_url: https://huggingface.co/Qwen/Qwen2-7B
  hf_token: ""
evaluation:
  script: /evals/run_mmlu.py
  data: /datasets/mmlu_sample/
  metric: accuracy
  metric_direction: maximize
  sample_size: 50
  timeout_seconds: 600
  skills: [throughput, latency, task_metric, memory]
sweep:
  concurrency_levels: [1, 2, 4, 8, 16, 32]
  input_lengths: [128, 256, 512, 1024, 2048]
  requests_per_cell: 10
  request_timeout_seconds: 30
optimization:
  phase_2a:
    max_rounds: 15
    patience: 3
    parameters:
      block_size: [8, 16, 32]
      gpu_memory_utilization: [0.75, 0.80, 0.85, 0.90]
      max_num_seqs: [64, 128, 256]
  phase_2b:
    max_rounds: 15
    patience: 3
    baseline:
      temperature: 1.0
      top_p: 1.0
      top_k: -1
      repetition_penalty: 1.0
    parameters:
      temperature: [0.6, 0.7, 0.8, 1.0]
      top_p: [0.85, 0.90, 0.95, 1.0]
      top_k: [-1, 20, 50, 100]
      repetition_penalty: [1.0, 1.05, 1.1]
save_dir: ./results/
